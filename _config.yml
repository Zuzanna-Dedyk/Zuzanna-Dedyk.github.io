# ============================================================
# _config.yml
# This is the master configuration file for your Jekyll site.
# Jekyll reads this once when it builds the site. It is NOT
# something visitors ever see directly.
# ============================================================

# --- Basic site information ---
title: "Zuzanna Dedyk"
description: "Academic website of Zuzanna Dedyk — research, publications, talks, and projects."
url: "https://zuzannadedyk.github.io"
baseurl: ""

# --- Author / contact details ---
# These values are reused across the whole site (footer, contact page,
# social icons, etc.) so you only ever update your email or ORCID here,
# in ONE place, instead of hunting through every page.
author:
  name: "Zuzanna Dedyk"
  email: "zuzanna.dedyk@research.fchampalimaud.org"
  institution: "Your Institution / Department"
  google_scholar: "https://scholar.google.com/citations?hl=en&user=Qk6ankgAAAAJ"   # paste full profile URL later
  orcid: "https://orcid.org/0000-0003-4319-1807"             # paste full ORCID URL later
  github: "zuzannadedyk"
  linkedin: "https://www.linkedin.com/in/zuzanna-dedyk-3649b218a "
  #bluesky: ""


# --- Markdown engine ---
markdown: kramdown
kramdown:
  input: GFM              # GitHub-Flavored Markdown (tables, etc.)
  syntax_highlighter: rouge

# --- URL structure for standalone pages ---
permalink: /:title/

# --- Collections ---
# A "collection" is a group of Markdown files that Jekyll treats as a
# structured set of items (like a mini-database). This is what lets you
# add a new publication just by dropping a new .md file in _publications/.
collections:
  pages:
    output: true
    permalink: /:path/
  projects:
    output: true
    permalink: /projects/:path/
  publications:
    output: true
    permalink: /publications/:path/
  talks:
    output: true
    permalink: /talks/:path/
  workshops:
    output: true
    permalink: /workshops/:path/

# --- Defaults ---
# Automatically applies a layout to every file in a collection so you
# never need to type "layout: publication" inside each publication file.
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
      type: "publications"
    values:
      layout: "publication"
  - scope:
      path: ""
      type: "talks"
    values:
      layout: "talk"
  - scope:
      path: ""
      type: "workshops"
    values:
      layout: "workshop"
  - scope:
      path: ""
    values:
      layout: "default"

# --- Plugins ---
# These are all on GitHub Pages' approved safe list, so they work with
# a plain "git push" — no special build pipeline required.
plugins:
  - jekyll-seo-tag     # generates SEO meta tags automatically
  - jekyll-sitemap     # generates sitemap.xml automatically
  - jekyll-feed        # generates an RSS feed automatically

# --- Files Jekyll should ignore when building ---
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
