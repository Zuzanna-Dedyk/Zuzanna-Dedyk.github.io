<!DOCTYPE html>
<!--
  _layouts/default.html
  This is the master template. Every page and every collection item
  (publications, talks, projects, workshops) is wrapped in this file
  at build time. It provides the <head>, header, footer, and the
  "skip to content" accessibility link — you should never need to
  edit this file when adding ordinary content.
-->
<html lang="en">

<head>
  {% include head.html %}
</head>

<body>

  <!-- Lets keyboard/screen-reader users jump straight past the nav -->
  <a class="skip-link" href="#main-content">Skip to main content</a>

  {% include header.html %}

  <main id="main-content">
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>

</html>
