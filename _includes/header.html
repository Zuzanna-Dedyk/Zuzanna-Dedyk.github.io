<!--
  _includes/header.html
  The navigation bar at the top of every page. It highlights the
  current page automatically by comparing page.url to each link's URL.
  The nav collapses into a hamburger menu on narrow (mobile) screens;
  assets/js/main.js handles opening and closing it.
-->
<header class="site-header">
  <div class="site-header__inner">
    <a href="{{ '/' | relative_url }}" class="site-header__brand">
      {{ site.author.name }}
    </a>

    <button
      class="nav-toggle"
      id="nav-toggle"
      aria-expanded="false"
      aria-controls="site-nav"
      aria-label="Open navigation menu"
    >
      <span class="nav-toggle__bar"></span>
      <span class="nav-toggle__bar"></span>
      <span class="nav-toggle__bar"></span>
    </button>

    <nav class="site-nav" id="site-nav" aria-label="Main navigation">
      <ul class="site-nav__list">
        <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>Home</a></li>
        <li><a href="{{ '/research/' | relative_url }}" {% if page.url == '/research/' %}aria-current="page"{% endif %}>Research</a></li>
        <li><a href="{{ '/projects/' | relative_url }}" {% if page.url == '/projects/' %}aria-current="page"{% endif %}>Projects</a></li>
        <li><a href="{{ '/publications/' | relative_url }}" {% if page.url == '/publications/' %}aria-current="page"{% endif %}>Publications</a></li>
        <li><a href="{{ '/talks/' | relative_url }}" {% if page.url == '/talks/' %}aria-current="page"{% endif %}>Talks</a></li>
        <li><a href="{{ '/workshops/' | relative_url }}" {% if page.url == '/workshops/' %}aria-current="page"{% endif %}>Workshops</a></li>
        <li><a href="{{ '/cv/' | relative_url }}" {% if page.url == '/cv/' %}aria-current="page"{% endif %}>CV</a></li>
        <li><a href="{{ '/contact/' | relative_url }}" {% if page.url == '/contact/' %}aria-current="page"{% endif %}>Contact</a></li>
      </ul>
    </nav>
  </div>
</header>
