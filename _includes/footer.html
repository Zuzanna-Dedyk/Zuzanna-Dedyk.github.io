<!--
  _includes/footer.html
  The footer at the bottom of every page: social/contact links and a
  copyright line. All the links pull from the "author" section of
  _config.yml, so updating your ORCID or Google Scholar link there
  updates it everywhere on the site automatically.
  Links with an empty value in _config.yml are skipped automatically.
-->
<footer class="site-footer">
  <div class="site-footer__inner">

    <p class="site-footer__copyright">
      © {{ site.time | date: '%Y' }} {{ site.author.name }}. Built with Jekyll, hosted on GitHub Pages.
    </p>
  </div>
</footer>
